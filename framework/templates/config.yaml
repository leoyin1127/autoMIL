# autoMIL Configuration
#
# Edit this file to configure autoMIL for your project.
# All project-specific settings live here so that program.md,
# hooks, and skills remain generic and reusable.

project:
  name: ""                         # e.g., "Ovarian HRD Optimization"
  task: ""                         # e.g., "hrd", "subtyping", "grading"
  branch_prefix: "autoMIL"        # Git branch prefix for experiment runs

paths:
  features_dir: ""                 # Path to H5 feature files (one per slide)
  splits_dir: ""                   # Path to fold split CSVs (optional, if pre-computed)
  output_dir: ""                   # Path for model checkpoints and logs

files:
  editable:
    - "train.py"                   # Files the agent CAN modify
  readonly:
    - "prepare.py"                 # Files the agent CANNOT modify

metrics:
  # The metric used for keep/discard decisions.
  # "composite" means a formula combining multiple metrics.
  # Set to a single metric name (e.g., "test_auc") to optimize one metric directly.
  optimize: "composite"
  composite_formula: "(test_auc + test_bacc) / 2"
  keep_threshold: 1e-6             # Minimum improvement to keep a commit
  display:                         # Metrics shown in results.tsv
    - "val_auc"
    - "val_bacc"
    - "test_auc"
    - "test_bacc"

run:
  command: "uv run python train.py > run.log 2>&1"
  extract_command: 'grep "^test_auc_roc:\|^val_auc_roc:\|^peak_vram_mb:\|^elapsed_seconds:" run.log'
  timeout_minutes: 120

baseline:
  composite: 0.0                   # Fill after running baseline benchmark
  description: ""                  # e.g., "encoder_name + model_name benchmark"

dataset:
  name: ""                         # e.g., "UHN ovarian cohort"
  size: 0                          # Number of samples (slides/patients)
  class_balance: ""                # e.g., "144 pos, 62 neg"
  cv_folds: 5                      # Number of cross-validation folds

# Optional: domain-specific context for the agent.
# Add any background the agent should know when picking strategies.
context: |
  Add domain-specific notes here. The agent reads this to understand
  what techniques are relevant to your problem. For example:
  - What kind of data (WSI, tiles, tabular features)?
  - What models are available (CLAM, TransMIL, custom)?
  - What has been tried before?
  - Any constraints (GPU memory, training time)?
