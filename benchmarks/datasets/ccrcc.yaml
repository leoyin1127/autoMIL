name: ccrcc
description: "CPTAC-CCRCC — Clear cell renal cell carcinoma (BAP1 mutation, grade, stage, survival)"

paths:
  data_root: "${AUTOBENCH_CCRCC_ROOT}"
  wsi_dir: "${data_root}/wsi"
  mapping_csv: "${data_root}/CCRCC_metadata.csv"
  output_dir: "${data_root}/trident_output"
  benchmark_dir: "${data_root}/benchmark"
  features_base_dir: "${output_dir}/20x_224px_0px_overlap"

tasks:
  # Mutation tasks — merged labels: Patho-Bench (103 cases) + GDC (91 more) = 206 cases
  bap1:
    label_col: "label_BAP1"
    label_map:
      0: "wildtype"
      1: "mutant"
    n_classes: 2
  pbrm1:
    label_col: "label_PBRM1"
    label_map:
      0: "wildtype"
      1: "mutant"
    n_classes: 2
  vhl:
    label_col: "label_VHL"
    label_map:
      0: "wildtype"
      1: "mutant"
    n_classes: 2
  # Clinical tasks — GDC clinical data, all 222 cases
  high_grade:
    label_col: "high_grade"
    label_map:
      0: "low"
      1: "high"
    n_classes: 2
  advanced_stage:
    label_col: "advanced_stage"
    label_map:
      0: "early"
      1: "advanced"
    n_classes: 2
  deceased:
    label_col: "deceased"
    label_map:
      0: "alive"
      1: "dead"
    n_classes: 2

split_strategies:
  standard:
    train_cohorts: []
    test_cohorts: []

task_strategy_feasibility:
  bap1: ["standard"]
  pbrm1: ["standard"]
  vhl: ["standard"]
  high_grade: ["standard"]
  advanced_stage: ["standard"]
  deceased: ["standard"]

slide_id_column: "slide_id"
slide_id_transform: null
wsi_extension: ".svs"
case_id_column: "case_id"
status_column: null
status_value: null

encoders:
  models:
    "paige-ai/Virchow2": "virchow2"
    "MahmoodLab/UNI2-h": "uni_v2"
    "bioptimus/H-optimus-1": "hoptimus1"
    "histai/hibou-L": "hibou_l"
    "MahmoodLab/conchv1_5": "conch_v15"
    "kaiko-ai/midnight": "midnight12k"
    "bioptimus/H0-mini": "h0_mini"
  dims:
    conch_v15: 768
    hibou_l: 1024
    uni_v2: 1536
    hoptimus1: 1536
    midnight12k: 1536
    virchow2: 2560
    h0_mini: 768

nnmil_models:
  - ab_mil
  - trans_mil
  - ds_mil
  - dtfd_mil
  - ilra_mil
  - wikg_mil
  - simple_mil
  - vision_transformer
  - rrt

extraction:
  magnification: 20
  patch_size: 224
  batch_size: 64
