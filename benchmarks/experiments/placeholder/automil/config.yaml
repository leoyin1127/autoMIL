# autoMIL Configuration — Placeholder Dataset
# Copy this template and fill in the values for your third dataset.

project:
  name: "placeholder"
  description: "Third dataset — TBD"

task:
  name: "example_task"
  type: "binary"
  num_classes: 2
  label_column: "label"
  positive_label: 1

data:
  features_dir: "${AUTOBENCH_PLACEHOLDER_ROOT}/benchmark/features"
  splits_dir: "${AUTOBENCH_PLACEHOLDER_ROOT}/benchmark/splits/standard/example_task"
  mapping_csv: "${AUTOBENCH_PLACEHOLDER_ROOT}/metadata.csv"
  num_folds: 5
  seed: 42

encoders:
  primary: "hoptimus1"
  available:
    hoptimus1: 1536

baseline:
  model: "clam_mb"
  framework: "CLAM"
  test_auc: 0.0
  composite: 0.0

metrics:
  primary: "composite"
  composite_formula: "(test_auc + test_bacc) / 2"
  track: ["val_auc", "val_bacc", "test_auc", "test_bacc"]

training:
  learning_rate: 3e-4
  weight_decay: 1e-4
  dropout: 0.25
  num_epochs: 100
  warmup_epochs: 5
  patience: 10
  batch_size: 32
  max_seq_length: 4096

files:
  editable: ["train.py", "models/"]
  readonly: []

run:
  script: "train.py"
  command: null

orchestrator:
  poll_interval_sec: 5
  safety_margin_gb: 2.0
  default_timeout_min: 150
  max_concurrent_per_gpu: 1
  default_vram_estimate_gb: 0.5

env:
  dotenv_files:
    - benchmarks/.env
